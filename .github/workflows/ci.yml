name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint
        run: swift package -q --allow-writing-to-package-directory format 

  build-and-test:
    needs: lint
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build
        run: swift build -q

      - name: Test
        run: swift test -q
